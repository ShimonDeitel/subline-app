name: Subline
options:
  bundleIdPrefix: com.shimondeitel.subline
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Subline:
    type: application
    platform: iOS
    sources:
      - path: Subline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.subline
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Subline/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SublineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SublineTests
      - path: Subline.storekit
    dependencies:
      - target: Subline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.subline.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SublineUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SublineUITests
    dependencies:
      - target: Subline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.subline.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Subline:
    build:
      targets:
        Subline: all
        SublineTests: [test]
        SublineUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Subline.storekit
    test:
      config: Debug
      storeKitConfiguration: Subline.storekit
      targets:
        - SublineTests
        - SublineUITests
    archive:
      config: Release
